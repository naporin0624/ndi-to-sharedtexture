name: windows-build

# Compile-verifies the Windows/Spout backend. Neither maintainer machine runs
# Windows, so this job is the build gate for the Spout code path. It does NOT
# verify runtime behavior (a real Windows host + NDI source + Spout receiver
# are needed for that).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Spout2 SDK
        shell: pwsh
        run: ./scripts/fetch-spout2.ps1

      - name: Install NDI SDK
        shell: pwsh
        run: |
          # The NDI SDK provides the import library Processing.NDI.Lib.x64.lib
          # that build.rs links against. Download + silent-install it.
          # NOTE: if this URL changes, update it here — this is the one step a
          # maintainer with a Windows machine may need to adjust.
          $url = "https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20SDK.exe"
          $exe = "$env:RUNNER_TEMP\NDI_SDK.exe"
          Invoke-WebRequest -Uri $url -OutFile $exe
          Start-Process -FilePath $exe -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait
          $sdk = "C:\Program Files\NDI\NDI 6 SDK"
          if (-not (Test-Path "$sdk\Lib\x64\Processing.NDI.Lib.x64.lib")) {
            Write-Error "NDI SDK import library not found at $sdk\Lib\x64"
            exit 1
          }
          "NDI_SDK_DIR=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --verbose
