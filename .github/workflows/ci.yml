name: CI

# Cheap PR/main checks only. macOS runners bill at 10x, so we intentionally do
# NOT build/clippy/test here — that needs macOS (Syphon + libndi) and is covered
# by the local rusty-hook gates (pre-commit fmt+clippy, pre-push test) and by the
# macOS build in release.yml (which runs only on an actual release).
#
# `cargo fmt --check` only parses source (no compile, no deps), so it runs on a
# cheap Linux runner.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check
