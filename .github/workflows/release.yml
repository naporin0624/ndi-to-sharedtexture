name: Release

# release-please manages versioning from conventional commits: it opens a
# release PR, and merging it creates the GitHub release + tag. The build jobs
# then compile the macOS and Windows binaries and attach them to that release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    # Single arm64 runner (macos-14) builds BOTH arches and lipos them into one
    # universal binary — GitHub's Intel macos-13 runners are scarce and queue for
    # hours. brew's libndi.dylib and the Syphon.framework are both built universal,
    # so cross-compiling x86_64 on the arm64 runner links cleanly.
    runs-on: macos-14
    timeout-minutes: 60
    name: Build (macOS universal)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install libndi (universal NDI runtime)
        run: brew install libndi

      - name: Build Syphon.framework (universal)
        run: |
          set -euo pipefail
          cd vendor/syphon-src
          xcodebuild -project Syphon.xcodeproj -scheme Syphon -configuration Release \
            -derivedDataPath build SYMROOT="$PWD/build" ONLY_ACTIVE_ARCH=NO
          cd "$GITHUB_WORKSPACE"
          rm -rf vendor/Syphon.framework
          cp -R vendor/syphon-src/build/Release/Syphon.framework vendor/Syphon.framework

      - name: Fetch LINE Seed JP (bundled by the GUI)
        run: ./scripts/fetch-fonts.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build both arches (CLI + GUI)
        run: |
          cargo build --release --features gui --target aarch64-apple-darwin
          cargo build --release --features gui --target x86_64-apple-darwin

      - name: Package universal
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          stage="${TAG}-macos-universal"
          mkdir -p "$stage"
          # Combine each per-arch binary into one universal Mach-O.
          for bin in bucatini bucatini-gui; do
            lipo -create \
              "target/aarch64-apple-darwin/release/$bin" \
              "target/x86_64-apple-darwin/release/$bin" \
              -output "$stage/$bin"
          done
          cp -R vendor/Syphon.framework "$stage/"
          cp README.md README.ja.md THIRD-PARTY-NOTICES "$stage/"
          # Let the binaries find the colocated (universal) Syphon.framework at
          # runtime. (libndi must be installed via `brew install libndi`.)
          install_name_tool -add_rpath @loader_path "$stage/bucatini"
          install_name_tool -add_rpath @loader_path "$stage/bucatini-gui"
          tar -czf "${stage}.tar.gz" "$stage"
          echo "ASSET=${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Build .app + .dmg installer
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          stage="${TAG}-macos-universal"   # universal binaries staged above
          ver="${TAG#bucatini-v}"          # bucatini-v0.2.2 -> 0.2.2
          mkdir -p dist
          bash packaging/macos/make-icns.sh assets/icon/bucatini-1024.png dist/bucatini.icns
          bash packaging/macos/build-app.sh "$ver" \
            "$stage/bucatini-gui" "$stage/bucatini" \
            vendor/Syphon.framework dist/bucatini.icns dist
          bash packaging/macos/build-dmg.sh "$ver" dist/Bucatini.app dist \
            README.md README.ja.md THIRD-PARTY-NOTICES
          echo "DMG=dist/Bucatini-${ver}-macos-universal.dmg" >> "$GITHUB_ENV"

      - name: Upload to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" "$ASSET" "$DMG" --clobber

  build-windows:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    # Windows/Spout backend: x86_64-pc-windows-msvc. The NDI runtime DLL is NOT
    # bundled (mirrors macOS not bundling libndi); the delay-load shim resolves
    # Processing.NDI.Lib.x64.dll from the NDI 6 Runtime (NDI_RUNTIME_DIR_Vx) at
    # run time, so end users install the NDI 6 Runtime once.
    runs-on: windows-latest
    timeout-minutes: 60
    name: Build (Windows x64)
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Spout2 SDK
        shell: pwsh
        run: ./scripts/fetch-spout2.ps1

      - name: Install NDI SDK
        shell: pwsh
        run: |
          # build.rs links Processing.NDI.Lib.x64.lib from the NDI SDK.
          ./scripts/install-ndi-sdk.ps1
          "NDI_SDK_DIR=C:\Program Files\NDI\NDI 6 SDK" |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Fetch LINE Seed JP (compiled into the GUI)
        shell: bash
        run: ./scripts/fetch-fonts.sh

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (CLI + GUI, release)
        run: cargo build --release --features gui

      - name: Package
        shell: pwsh
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          $stage = "$env:TAG-windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/bucatini.exe $stage/
          Copy-Item target/release/bucatini-gui.exe $stage/
          Copy-Item README.md, README.ja.md, THIRD-PARTY-NOTICES $stage/
          $asset = "$stage.zip"
          Compress-Archive -Path $stage -DestinationPath $asset -Force
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Inno Setup installer
        shell: pwsh
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $stage = "$env:TAG-windows-x64"
          $ver = $env:TAG -replace '^bucatini-v',''
          # ICO from the source PNG (Pillow ships on the runner's Python).
          pip install --quiet pillow
          python packaging/make-ico.py assets/icon/bucatini-1024.png "$stage/bucatini.ico"
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          # ISCC resolves relative paths (SetupIconFile, [Files] Source, OutputDir)
          # against the .iss script's directory, not the CWD, so pass absolute
          # paths for the staged inputs and the output directory.
          $srcDir = (Resolve-Path $stage).Path
          $outDir = Join-Path (Get-Location) "dist"
          & $iscc "/DMyAppVersion=$ver" "/DSourceDir=$srcDir" "/DOutputDir=$outDir" packaging/windows/bucatini.iss
          "SETUP=dist/Bucatini-$ver-windows-x64-setup.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload to the GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$env:TAG" "$env:ASSET" "$env:SETUP" --clobber
